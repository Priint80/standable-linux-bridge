name: Apply Standable polish patch

on:
  push:
    branches:
      - agent/polish-dashboard-installer
    paths:
      - tools/apply_agent_polish.py
      - .github/workflows/agent-polish-dashboard-installer.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: agent/polish-dashboard-installer
          fetch-depth: 0

      - name: Apply and validate asserted patch
        id: validate
        shell: bash
        run: |
          set +e
          (
            set -e
            python3 tools/apply_agent_polish.py
            bash -n install.sh
            for script in scripts/*.sh; do bash -n "$script"; done
            PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile scripts/bridge-manager.py
            PYTHONDONTWRITEBYTECODE=1 python3 scripts/bridge-manager.py --self-test
            make native
            build/dashboard/standable_dashboard_overlay --self-test
          ) 2>&1 | tee agent-polish-validation.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > agent-polish-status.txt
          tar -czf agent-polish-source.tar.gz \
            Makefile install.sh README.md README-LINUX.md \
            src/native/driver_main.cpp src/native/relay_tracker.cpp \
            src/dashboard/dashboard_main.cpp \
            scripts/diagnose.sh scripts/verify-artifacts.sh \
            tests/script_runtime.sh
          exit 0

      - name: Upload patched source and transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standable-polish-validation
          path: |
            agent-polish-source.tar.gz
            agent-polish-validation.log
            agent-polish-status.txt
          if-no-files-found: error
          retention-days: 1
