name: Apply Standable polish patch

on:
  push:
    branches:
      - agent/polish-dashboard-installer
    paths:
      - tools/apply_agent_polish.py
      - .github/workflows/agent-polish-dashboard-installer.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: agent/polish-dashboard-installer
          fetch-depth: 0

      - name: Apply and validate asserted patch
        shell: bash
        run: |
          set +e
          (
            set -e
            python3 tools/apply_agent_polish.py
            bash -n install.sh
            for script in scripts/*.sh; do bash -n "$script"; done
            PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile scripts/bridge-manager.py
            PYTHONDONTWRITEBYTECODE=1 python3 scripts/bridge-manager.py --self-test
            make native
            build/dashboard/standable_dashboard_overlay --self-test
          ) 2>&1 | tee agent-polish-validation.log
          status=${PIPESTATUS[0]}
          set -e
          if ((status != 0)); then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-polish-validation.log
            git commit -m "Record polish validation failure" || true
            git push origin HEAD:agent/polish-dashboard-installer
            exit "$status"
          fi
          rm -f agent-polish-validation.log

      - name: Commit validated patch
        run: |
          rm -f tools/apply_agent_polish.py .github/workflows/agent-polish-dashboard-installer.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish dashboard input and installer"
          git push origin HEAD:agent/polish-dashboard-installer
